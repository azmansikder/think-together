{% extends "base/student_base.html" %}
{% block title %}Confirm Delete{% endblock %}
{% block page_title %}Delete Project{% endblock %}

{% block content %}
<div class="form-card" style="text-align:center; max-width:450px; margin:40px auto;">
  <div style="font-size:3rem; margin-bottom:16px;">🗑️</div>
  <h3 style="color:#2c3e50; margin-bottom:10px;">Delete "{{ project.title }}"?</h3>
  <p style="color:#6c757d; margin-bottom:24px;">This action cannot be undone.</p>
  <form method="POST" style="display:flex; gap:12px; justify-content:center;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'studentpanel:my_projects' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
